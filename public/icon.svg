<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#14532d" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </radialGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
  </defs>
  <!-- Background circle/square for maskable icon compliance -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  
  <g transform="translate(106, 116)">
    <!-- Main Card Body -->
    <rect x="0" y="30" width="300" height="190" rx="20" fill="url(#card-grad)" filter="drop-shadow(0px 10px 20px rgba(0,0,0,0.5))" />
    <!-- Chip -->
    <rect x="35" y="70" width="45" height="35" rx="6" fill="#f59e0b" opacity="0.9" />
    <line x1="57.5" y1="70" x2="57.5" y2="105" stroke="#78350f" stroke-width="1.5" />
    <line x1="35" y1="87.5" x2="80" y2="87.5" stroke="#78350f" stroke-width="1.5" />
    
    <!-- Design accent lines -->
    <path d="M 120 180 L 170 140 L 220 160 L 270 100" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="270" cy="100" r="10" fill="#ffffff" />
    
    <!-- Minimalist Tracker accent dots -->
    <circle cx="240" cy="70" r="15" fill="#ffffff" opacity="0.2" />
    <circle cx="265" cy="70" r="15" fill="#ffffff" opacity="0.3" />
  </g>
</svg>
